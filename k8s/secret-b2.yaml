# Backblaze B2 credentials for result upload/download.
# Create an application key at https://secure.backblaze.com/b2_buckets.htm
apiVersion: v1
kind: Secret
metadata:
  name: b2-credentials
  namespace: ai-diplomacy
type: Opaque
stringData:
  B2_APPLICATION_KEY_ID: "REPLACE_ME"
  B2_APPLICATION_KEY: "REPLACE_ME"
